name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: install
        run: uv sync --all-extras
      - name: lint
        run: uv run ruff check .
      - name: test
        run: uv run pytest -v
